[workspace]
channels = ["conda-forge", "bioconda"]
name = "seurat"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
check = "Rscript check.R"
export-env = "pixi workspace export conda-environment --name $(basename $(git rev-parse --show-toplevel)) envs/seurat.yml && sed -i '1s/^/# this file was auto-generated by pixi - do not edit by hand\\n/' envs/seurat.yml"

[dependencies]
r-base = ">=4.4"
r-seurat = ">=5.0.0"
# NOTE: bioconductor-anndatar is intentionally absent. It only ships r45
# builds (r-base >=4.5), which conflicts with r-bpcells (r44 / r-base 4.4).
# Only select.R used it (read_h5ad); the pca/bpcells path does not. Re-add
# once an r44 anndatar build exists, or port select.R off it.
bioconductor-rhdf5 = "*"
bioconductor-hdf5array = "*"
"r-data.table" = "*"
r-optparse = "*"
r-magrittr = "*"
r-yaml = "*"
r-bpcells = "*"
# r-obkit is vendored under src/obkit_logger.R because the bioconda
# r-bpcells builds are pinned to r-base 4.4 while r-obkit on
# prefix.dev/edge requires r-base 4.5. Drop the vendor + re-add this
# dep once a compatible build exists.
