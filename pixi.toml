[workspace]
channels = ["conda-forge", "bioconda"]
name = "seurat"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
check = "Rscript check.R"
export-env = "pixi workspace export conda-environment --name $(basename $(git rev-parse --show-toplevel)) envs/seurat.yml && sed -i '1s/^/# this file was auto-generated by pixi - do not edit by hand\\n/' envs/seurat.yml"

[dependencies]
r-base = ">=4.5"
r-seurat = ">=5.0.0"
bioconductor-anndatar = "*"
bioconductor-rhdf5 = "*"
bioconductor-hdf5array = "*"
"r-data.table" = "*"
r-optparse = "*"
r-magrittr = "*"
