[workspace]
channels = ["conda-forge", "bioconda"]
name = "seurat"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
check = "Rscript check.R"
export-env = "pixi workspace export conda-environment --name $(basename $(git rev-parse --show-toplevel)) envs/seurat.yml && sed -i '1s/^/# this file was auto-generated by pixi - do not edit by hand\\n/' envs/seurat.yml"

[dependencies]
r-base = ">=4.5"
r-seurat = ">=5.0.0"
bioconductor-anndatar = "*"
bioconductor-rhdf5 = "*"
bioconductor-hdf5array = "*"
"r-data.table" = "*"
r-optparse = "*"
r-magrittr = "*"
r-yaml = "*"
r-argparser = "*"   # used by the vendored src/common/cli.R helpers
# TODO: add r-obkit

# Bootstrap tooling, kept out of the (heavy) R default env. `pixi run -e bootstrap
# sync` vendors the shared common/ under src/common/ (the R engine cli.R + the
# benchmark's stage schemas) — no sibling checkout needed: it fetches pull.py from
# the boilerplate over HTTP and runs it. pull.py is a *Python* script (CWD-relative,
# only needs pyyaml + git), independent of this module's R toolchain; `lang: r` in
# omnibenchmark.yaml is what makes it vendor the R engine. Which branch the SCRIPT
# is fetched from is `$BRANCH` (default main); override to test an unmerged
# boilerplate branch:  BRANCH=my-branch pixi run -e bootstrap sync
# The vendored CONTENT comes from `boilerplate.ref` (and each benchmark's `ref`) in
# omnibenchmark.yaml — set those to the branch to test unmerged content too.
[feature.bootstrap.dependencies]
python = ">=3.11"
pyyaml = ">=6"
curl = "*"

[feature.bootstrap.tasks]
sync = "sh -c 'curl -fsSL https://raw.githubusercontent.com/omni-scrna/boilerplate/${BRANCH:-main}/scripts/pull.py | python -'"

# Test tooling, kept out of the default runtime env. The `dev` environment layers
# r-testthat on top of the default R stack (rhdf5/Matrix/Seurat), so the tests can
# source src/ and exercise the real readers:  pixi run -e dev test
[feature.test.dependencies]
r-testthat = "*"

[feature.test.tasks]
test = "Rscript -e 'testthat::test_dir(\"tests/testthat\", stop_on_failure = TRUE)'"

[environments]
bootstrap = { features = ["bootstrap"], no-default-feature = true }
dev = { features = ["test"] }
